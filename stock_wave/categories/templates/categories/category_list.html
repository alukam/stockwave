{% extends 'base.html' %}
{% block content %}
<div class="container mt-4">
    <h2>Inventory Categories</h2>

    <div class="card mb-4">
        <div class="card-body">
            <form method="POST" class="form-inline">
                {% csrf_token %}
                <input type="text" name="name" class="form-control mr-2" placeholder="New Category Name ()" required>
                <button type="submit" class="btn btn-primary">Add Category</button>
            </form>
        </div>
    </div>

    <table class="table table-striped">
        <thead>
            <tr>
                <th>Name</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for cat in categories %}
            <tr>
                <td>{{ cat.name }}</td>
                <td>
                    <a href="{% url 'delete_category' cat.id %}" class="btn btn-sm btn-danger" onclick="return confirm('Delete this category?')">Delete</a>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="2" class="text-center">No categories found. Add your first one above!</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
