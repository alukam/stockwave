{% extends 'base.html' %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="glass-card p-4 shadow-sm">
                <h4 class="fw-bold mb-4"><i class="fas fa-user-plus me-2"></i>Record New Debt</h4>
                
                <form method="POST">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">Customer Name</label>
                        <input type="text" name="name" class="form-control" placeholder="e.g. John Doe" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Phone Number</label>
                        <input type="text" name="phone" class="form-control" placeholder="07...">
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Product Taken</label>
                        <select name="product" class="form-select" required>
                            <option value="">Select Product...</option>
                            {% for p in products %}
                            <option value="{{ p.id }}">{{ p.name }} (Stock: {{ p.quantity }})</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="row">
                        <div class="col-6 mb-3">
                            <label class="form-label fw-bold">Quantity</label>
                            <input type="number" name="quantity" class="form-control" value="1" min="1" required>
                        </div>
                        <div class="col-6 mb-3">
                            <label class="form-label fw-bold">Total Debt (UGX)</label>
                            <input type="number" name="total_amount" class="form-control" placeholder="e.g. 50000" required>
                        </div>
                    </div>

                    <div class="d-grid gap-2 mt-3">
                        <button type="submit" class="btn btn-primary fw-bold py-2">Save Debt & Update Stock</button>
                        <a href="{% url 'debtor_list' %}" class="btn btn-light">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
