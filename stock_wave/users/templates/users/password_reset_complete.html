{% extends 'registration/login.html' %}
{% block content %}
<div class="login-card p-4 shadow-lg border-0 mx-auto text-center" style="max-width: 400px; margin-top: 50px;">
    <div class="p-3 bg-success rounded-circle d-inline-block mb-3">
        <i class="fas fa-check fa-2x text-white"></i>
    </div>
    <h4 class="fw-bold">Password Updated!</h4>
    <p class="text-muted small">
        Your new password has been set successfully. You can now log in to StockWave using your new credentials.
    </p>
    
    <a href="{% url 'login' %}" class="btn btn-primary w-100 py-3 fw-bold shadow-sm mt-3">
        LOGIN NOW
    </a>
</div>
{% endblock %}
