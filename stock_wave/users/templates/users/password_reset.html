{% extends 'users/auth_layout.html' %}
{% block auth_content %}
<div class="login-card p-4 shadow-lg border-0 mx-auto" style="max-width: 400px; margin-top: 50px;">
    <div class="text-center mb-4">
        <div class="p-3 bg-light rounded-circle d-inline-block mb-2">
            <i class="fas fa-unlock-alt fa-2x text-primary"></i>
        </div>
        <h4 class="fw-bold">Reset Password</h4>
        <p class="text-muted small">Enter your email and we'll send you a secure link to reset your account.</p>
    </div>

    <form method="post">
        {% csrf_token %}
        <div class="mb-4">
            <label class="form-label small fw-bold">Email Address</label>
            <input type="email" name="email" class="form-control bg-light border-0 p-3" placeholder="name@company.com" required>
        </div>

        <button type="submit" class="btn btn-primary w-100 py-3 fw-bold shadow-sm">
            SEND RESET LINK
        </button>
    </form>
    
    <div class="text-center mt-3">
        <a href="{% url 'login' %}" class="small text-decoration-none text-muted">Return to Login</a>
    </div>
</div>
{% endblock %}
