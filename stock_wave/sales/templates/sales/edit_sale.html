{% extends 'base.html' %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="glass-card p-4 shadow-sm border-top border-4 border-primary">
                <h3 class="fw-bold mb-4"><i class="fas fa-edit me-2 text-primary"></i>Edit Sale #{{ sale.id }}</h3>
                
                <form method="POST">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">Product</label>
                        <select name="product" class="form-select border-2">
                            {% for product in products %}
                            <option value="{{ product.id }}" {% if product.id == sale.product.id %}selected{% endif %}>
                                {{ product.name }} (Current Stock: {{ product.quantity }})
                            </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Quantity</label>
                            <input type="number" name="quantity" class="form-control border-2" value="{{ sale.quantity }}" min="1" required>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Negotiated Price (UGX)</label>
                            <input type="number" name="negotiated_price" class="form-control border-2" value="{{ sale.negotiated_price }}" required>
                        </div>
                    </div>

                    <div class="alert alert-warning py-2 small mb-4">
                        <i class="fas fa-exclamation-triangle me-1"></i> 
                        Saving will automatically revert and recalculate stock levels.
                    </div>

                    <div class="d-flex gap-2 pt-2">
                        <button type="submit" class="btn btn-primary fw-bold px-4 shadow-sm">Save Changes</button>
                        <a href="{% url 'sales_management' %}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
