{% extends 'base.html' %}
{% block content %}
<div class="login-card p-4 shadow-lg mx-auto" style="max-width: 400px;">
    <h4 class="fw-bold">Set New Password</h4>
    <p class="text-muted small">Please enter your new password twice.</p>
    
    {% if validlink %}
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary w-100">CHANGE PASSWORD</button>
        </form>
    {% else %}
        <div class="alert alert-danger">
            This reset link is invalid or has expired.
        </div>
        <a href="{% url 'password_reset' %}" class="btn btn-outline-secondary w-100">Request New Link</a>
    {% endif %}
</div>
{% endblock %}
