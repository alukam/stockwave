<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | StockWave UG</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #1a252f 0%, #2c3e50 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        .login-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
            padding: 40px;
        }
        .brand-icon {
            width: 65px; height: 65px;
            background: #3498db;
            color: white;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }
        .btn-login {
            background: #3498db;
            border: none;
            padding: 14px;
            font-weight: 600;
            border-radius: 12px;
            transition: 0.3s;
        }
        .btn-login:hover {
            background: #2980b9;
            transform: translateY(-2px);
        }
        .form-control:focus {
            box-shadow: none;
            border: 1px solid #3498db;
        }
        /* Custom styling for the eye button to match your input */
        .input-group-text {
            background-color: #f8f9fa; /* Matches bg-light */
            border: none;
            cursor: pointer;
        }
        .register-link {
            text-decoration: none;
            color: #3498db;
            font-weight: 600;
        }
        .register-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="container d-flex flex-column align-items-center">
    <div class="login-card">
        <div class="text-center">
            <div class="brand-icon shadow">
                <i class="fas fa-wave-square fa-2x"></i>
            </div>
            <h3 class="fw-bold text-dark">STOCKWAVE</h3>
            <p class="text-muted small">Enter credentials to access POS</p>
        </div>

        <form method="post">
            {% csrf_token %}
            
            <div class="mb-3">
                <label class="form-label small fw-bold">Username</label>
                <input type="text" name="username" class="form-control bg-light border-0 p-3" placeholder="Enter username" required>
            </div>

            <div class="mb-2">
                <label class="form-label small fw-bold">Password</label>
                <div class="input-group">
                    <input type="password" name="password" id="passwordField" class="form-control bg-light border-0 p-3" placeholder="••••••••" required>
                    <span class="input-group-text p-3" onclick="togglePassword()">
                        <i class="fas fa-eye text-muted" id="eyeIcon"></i>
                    </span>
                </div>
            </div>

            <div class="text-end mb-4">
                <a href="{% url 'password_reset' %}" class="small text-muted text-decoration-none">Forgot Password?</a>
            </div>
            
            {% if form.errors %}
                <div class="alert alert-danger small py-2">
                    <i class="fas fa-exclamation-circle me-1"></i> Invalid credentials.
                </div>
            {% endif %}

            <button type="submit" class="btn btn-primary btn-login w-100 shadow-sm mb-3">
                LOGIN TO DASHBOARD
            </button>
        </form>

        <div class="text-center mt-2">
            <p class="mb-0 small text-muted">New staff member?</p>
            <a href="{% url 'register' %}" class="register-link small">Request Access Account</a>
        </div>
    </div>
    
    <p class="mt-4 text-white-50 small">&copy; 2026 StockWave Inventory Systems</p>
</div>

<script>
    function togglePassword() {
        const passwordField = document.getElementById('passwordField');
        const eyeIcon = document.getElementById('eyeIcon');
        
        if (passwordField.type === 'password') {
            passwordField.type = 'text';
            eyeIcon.classList.remove('fa-eye');
            eyeIcon.classList.add('fa-eye-slash');
        } else {
            passwordField.type = 'password';
            eyeIcon.classList.remove('fa-eye-slash');
            eyeIcon.classList.add('fa-eye');
        }
    }
</script>

</body>
</html>
