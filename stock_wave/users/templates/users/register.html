{% extends 'registration/login.html' %} {% block content %}
<div class="login-card p-4 shadow-lg border-0 mx-auto" style="max-width: 400px; margin-top: 50px;">
    <div class="text-center mb-4">
        <div class="p-3 bg-light rounded-circle d-inline-block mb-2">
            <i class="fas fa-user-plus fa-2x text-primary"></i>
        </div>
        <h4 class="fw-bold">Staff Request</h4>
        <p class="text-muted small">Create an account for manager approval</p>
    </div>

    <form method="post">
        {% csrf_token %}
        {% for field in form %}
            <div class="mb-3">
                <label class="form-label small fw-bold">{{ field.label }}</label>
                <input type="{{ field.field.widget.input_type }}" 
                       name="{{ field.name }}" 
                       class="form-control bg-light border-0 p-3" 
                       placeholder="Enter {{ field.label }}">
                {% if field.errors %}
                    <small class="text-danger">{{ field.errors|striptags }}</small>
                {% endif %}
            </div>
        {% endfor %}
        <button type="submit" class="btn btn-primary w-100 py-3 fw-bold shadow-sm">
            SEND REQUEST
        </button>
    </form>
    
    <div class="text-center mt-3">
        <a href="{% url 'login' %}" class="small text-decoration-none">Already have an account? Login</a>
    </div>
</div>
{% endblock %}
