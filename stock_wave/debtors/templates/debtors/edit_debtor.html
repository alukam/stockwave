{% extends 'base.html' %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="glass-card p-4 shadow-sm border-top border-4 border-secondary">
                <h4 class="fw-bold mb-4">Edit Debt Record</h4>
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-bold">Customer Name</label>
                        <input type="text" name="name" class="form-control" value="{{ debtor.name }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Phone</label>
                        <input type="text" name="phone" class="form-control" value="{{ debtor.phone }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Total Debt Amount (UGX)</label>
                        <input type="number" name="total_amount" class="form-control" value="{{ debtor.total_amount }}" required>
                    </div>
                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-primary fw-bold">Save Changes</button>
                        <a href="{% url 'debtor_list' %}" class="btn btn-light">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
